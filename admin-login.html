<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Bombay Cloud Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#ff4400',
          },
          fontFamily: {
            display: ['Work Sans', 'sans-serif'],
          },
        },
      },
    };
  </script>
  
  <style>
    body {
      font-family: 'Work Sans', sans-serif;
      background: linear-gradient(135deg, #23140f 0%, #1a0f0b 100%);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <!-- Login Container -->
  <div class="w-full max-w-md">
    
    <!-- Logo & Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-primary rounded-full mb-4 shadow-lg shadow-primary/30">
        <span class="material-symbols-outlined text-white text-4xl">admin_panel_settings</span>
      </div>
      <h1 class="text-3xl font-black text-white mb-2">Admin Portal</h1>
      <p class="text-slate-400 text-sm">Bombay Cloud Kitchen Dashboard</p>
    </div>

    <!-- Login Card -->
    <div class="bg-zinc-900/80 backdrop-blur-md border border-primary/20 rounded-2xl p-8 shadow-2xl">
      
      <form id="loginForm" class="space-y-6">
        
        <!-- Admin ID Field -->
        <div>
          <label class="block text-slate-300 text-sm font-semibold mb-2">
            <span class="material-symbols-outlined text-base align-middle mr-1">badge</span>
            Admin ID
          </label>
          <input 
            type="text" 
            id="adminId" 
            required
            placeholder="Enter your admin ID"
            class="w-full bg-[#23140f] border-2 border-slate-700 text-white px-4 py-3 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"
          />
        </div>

        <!-- Password Field -->
        <div>
          <label class="block text-slate-300 text-sm font-semibold mb-2">
            <span class="material-symbols-outlined text-base align-middle mr-1">lock</span>
            Password
          </label>
          <div class="relative">
            <input 
              type="password" 
              id="password" 
              required
              placeholder="Enter your password"
              class="w-full bg-[#23140f] border-2 border-slate-700 text-white px-4 py-3 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all pr-12"
            />
            <button 
              type="button"
              onclick="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors"
            >
              <span class="material-symbols-outlined" id="toggleIcon">visibility</span>
            </button>
          </div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
          <span class="material-symbols-outlined text-lg">error</span>
          <span id="errorText">Invalid credentials</span>
        </div>

        <!-- Login Button -->
        <button 
          type="submit"
          class="w-full bg-primary text-white py-3.5 rounded-lg font-bold text-base hover:bg-orange-600 transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/30"
        >
          <span class="material-symbols-outlined">login</span>
          Sign In
        </button>

      </form>

      <!-- Back to Home -->
      <div class="mt-6 text-center">
        <a href="index.html" class="text-slate-400 hover:text-primary transition-colors text-sm inline-flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">arrow_back</span>
          Back to Home
        </a>
      </div>

    </div>

    <!-- Info Text -->
    <p class="text-center text-slate-500 text-xs mt-6">
      Authorized personnel only. All access is logged.
    </p>

  </div>

  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 bg-zinc-950/80 backdrop-blur-md border-t border-white/10 py-4">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-2">
        <p class="text-slate-500 text-xs">© 2024 Bombay Cloud Kitchen. All rights reserved.</p>
        <div class="flex items-center gap-4 text-xs">
          <a href="#" class="text-slate-500 hover:text-primary transition-colors">Privacy Policy</a>
          <a href="#" class="text-slate-500 hover:text-primary transition-colors">Terms of Service</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    // Toggle password visibility
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.textContent = 'visibility_off';
      } else {
        passwordInput.type = 'password';
        toggleIcon.textContent = 'visibility';
      }
    }

    // Handle login form submission
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const adminId = document.getElementById('adminId').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMessage = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');

      // Validate credentials
      if (adminId === 'Iamironman' && password === 'Har@2001') {
        // Store admin session
        sessionStorage.setItem('adminLoggedIn', 'true');
        sessionStorage.setItem('adminId', adminId);
        sessionStorage.setItem('loginTime', new Date().toISOString());
        
        // Show success message
        errorMessage.classList.remove('hidden', 'bg-red-500/10', 'border-red-500/50', 'text-red-400');
        errorMessage.classList.add('bg-green-500/10', 'border-green-500/50', 'text-green-400');
        errorText.textContent = 'Login successful! Redirecting...';
        
        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = 'admin-dashboard.html';
        }, 1000);
        
      } else {
        // Show error message
        errorMessage.classList.remove('hidden');
        errorMessage.classList.add('bg-red-500/10', 'border-red-500/50', 'text-red-400');
        errorText.textContent = 'Invalid Admin ID or Password';
        
        // Shake animation
        errorMessage.classList.add('animate-bounce');
        setTimeout(() => {
          errorMessage.classList.remove('animate-bounce');
        }, 500);
      }
    });

    // Check if already logged in
    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
      window.location.href = 'admin-dashboard.html';
    }
  </script>

</body>
</html>
